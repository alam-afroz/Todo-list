<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Todo List</title>
  </head>
  <body>
    <div class="container">
      <dialog id="dialog_task">
        <form id="form_task">
          <p>
            <label for="task_title">Task Title</label>
            <input
              type="text"
              id="task_title"
              name="task_title"
              placeholder="finish ppt"
              required
            />
          </p>
          <p>
            <label for="task_description">Description</label>
            <textarea
              type="text"
              id="task_description"
              name="task_description"
              placeholder="I have to complete the project presentation..."
            ></textarea>
          </p>

          <p>
            <span>Priority : </span>
            <label for="high_priority">High</label>
            <input type="radio" id="high_priority" name="priority" />
            <label for="moderate_priority">Moderate</label>
            <input type="radio" id="moderate_priority" name="priority" />
            <label for="low_priority">Low</label>
            <input type="radio" id="low_priority" name="priority" />
          </p>

          <p>
            <label for="task_due_date">Due Date</label>
            <input type="date" id="task_due_date" name="task_due_date" />
          </p>
          <p class="subtask">
            <button>Add Subtask</button>
          </p>
          <button type="submit">Save Task</button>
        </form>
      </dialog>
      <dialog id="dialog_project">
        <form id="form_project">
          <p>
            <label for="project_name">Project Name</label>
            <input type="text" name="project_name" id="project_name" required />
          </p>
          <button>Save Task to this Project</button>
        </form>
      </dialog>
      <dialog id="add_task_to_project">
        <label for="task_to_add"> </label>
      </dialog>
      <header>
        <div class="logo">
          <p id="logo_task">Task</p>
          <p id="logo_to">To</p>
          <p id="logo_do">Do</p>
        </div>
      </header>
      <nav>
        <button id="add_project_btn">Add Projects</button>
        <p id="project_heading">Projects |</p>
        <div id="project_list"></div>
      </nav>
      <button id="add_task_btn">Task +</button>
      <div id="content"></div>
      <footer>footer</footer>
    </div>
  </body>
</html>
